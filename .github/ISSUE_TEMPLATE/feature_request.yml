name: Feature request
description: Propose a QUBE capability or package behavior change.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the expected behavior, command surface, or package impact.
    validations:
      required: true
  - type: textarea
    id: discovery-install
    attributes:
      label: CLI Discovery And Install Impact
      description: If this adds or changes an adapter, host, provider, or CI surface, include acceptance criteria for `qube components --json`, `qube install --help`, and `qube install --yes --dry-run --json`. Otherwise state "Not applicable."
      placeholder: |
        - qube components --json reports ...
        - qube install --help shows ...
        - qube install --yes --dry-run --json includes ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false
  - type: dropdown
    id: package-area
    attributes:
      label: Area
      options:
        - QUBE shared CLI/runtime
        - AIB
        - AIE
        - AIQ
        - AIU
        - Adapters or plugins
        - Documentation
        - Unsure
    validations:
      required: true
