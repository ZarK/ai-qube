name: Publish

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24

      - run: corepack enable

      - run: corepack prepare pnpm@11.0.4 --activate

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm run verify

      - name: Install npm with pinned integrity
        run: |
          set -euo pipefail
          tarball="$RUNNER_TEMP/npm-11.15.0.tgz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            https://registry.npmjs.org/npm/-/npm-11.15.0.tgz \
            --output "$tarball"
          node - "$tarball" <<'NODE'
          const { createHash } = require("node:crypto");
          const { readFileSync } = require("node:fs");

          const expected = "sha512-+k0tk7lRnpMUPnC7kTuU/yrV/mnFoPhJQ75VfLtZ6fwbzOVXaPsTE/Il9Pn1DHi482byMyqkHv/XsQ76mNjXLw==";
          const actual = `sha512-${createHash("sha512").update(readFileSync(process.argv[2])).digest("base64")}`;

          if (actual !== expected) {
            console.error(`npm tarball integrity mismatch: ${actual}`);
            process.exit(1);
          }
          NODE
          npm install -g "$tarball" --ignore-scripts
          test "$(npm --version)" = "11.15.0"

      - run: npm stage publish .
