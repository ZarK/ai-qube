name: publish.yml

on:
  workflow_dispatch:
  push:
    tags:
      - "publish-*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/publish-')
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      # actions/checkout@v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false

      - run: corepack enable

      - run: corepack prepare pnpm@11.0.4 --activate

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm run verify

      - name: Install npm 11.15.0
        run: |
          npm install -g npm@11.15.0 --ignore-scripts
          test "$(npm --version)" = "11.15.0"

      - name: Show trusted publisher claim strings
        run: |
          node <<'NODE'
          const url = new URL(process.env.ACTIONS_ID_TOKEN_REQUEST_URL);
          url.searchParams.append("audience", "npm:registry.npmjs.org");

          const response = await fetch(url, {
            headers: {
              Accept: "application/json",
              Authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}`,
            },
          });
          const { value } = await response.json();
          const payload = JSON.parse(Buffer.from(value.split(".")[1], "base64url").toString("utf8"));
          const workflowFile = payload.workflow_ref?.match(/\.github\/workflows\/([^@]+)/)?.[1] ?? "";

          console.log(`repository=${payload.repository ?? ""}`);
          console.log(`workflow_ref.file=${workflowFile}`);
          console.log(`environment=${payload.environment ?? ""}`);
          console.log(`ref=${payload.ref ?? ""}`);
          NODE

      - name: Stage npm package
        run: npm stage publish . --access public --loglevel=verbose
