name: Publish

on:
  push:
    tags:
      - "publish-*"

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/publish-')
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.12.0
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.4 --activate

      - name: Resolve package tag
        id: plan
        shell: bash
        run: |
          node scripts/resolve-publish-tag.mjs "${GITHUB_REF_NAME}" > publish-plan.json
          node -e "const p=require('./publish-plan.json'); for (const [key,value] of Object.entries(p)) console.log(key + '=' + value)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify selected package
        shell: bash
        run: ${{ steps.plan.outputs.verify }}

      - name: Publish selected package
        working-directory: ${{ steps.plan.outputs.path }}
        run: npm stage publish --provenance --access public
