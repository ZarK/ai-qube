name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "publish-*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/publish-')
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.4 --activate

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.1
          cache: false

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.92.0
          components: llvm-tools-preview, clippy, rustfmt

      - name: Install cargo-llvm-cov
        run: |
          cargo install cargo-llvm-cov --version 0.8.7 --locked --root "$RUNNER_TEMP/cargo-llvm-cov"
          printf '%s\n' "$RUNNER_TEMP/cargo-llvm-cov/bin" >> "$GITHUB_PATH"

      - name: Install cross-language test tools
        run: python -m pip install -r test-projects/python/requirements.txt

      - name: Verify tag is reachable from main
        if: startsWith(github.ref, 'refs/tags/publish-')
        run: |
          git fetch --no-tags origin main
          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$tag_commit" origin/main

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: pnpm run build

      - name: Run standalone tests
        run: pnpm test

      - name: Run publish readiness gate
        run: pnpm run test:publish-readiness

      - name: Run benchmark budgets
        run: pnpm run bench:ci

      - name: Run lint
        run: pnpm run lint

      - name: Install npm 11.15.0
        run: |
          npm install -g npm@11.15.0 --ignore-scripts
          test "$(npm --version)" = "11.15.0"

      - name: Stage npm packages
        run: |
          unset NODE_AUTH_TOKEN
          npm config delete //registry.npmjs.org/:_authToken || true
          npm stage publish . --workspace @tjalve/aiq --access public --provenance --ignore-scripts
